version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bcm-postgres
    environment:
      POSTGRES_DB: bcm_platform_dev
      POSTGRES_USER: bcm_user
      POSTGRES_PASSWORD: bcm_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bcm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcm_user -d bcm_platform_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bcm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bcm.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bcm-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  bcm-network:
    driver: bridge

