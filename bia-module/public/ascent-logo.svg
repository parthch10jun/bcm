<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="ascentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a87;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00a86b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c77b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ascent Icon - Stylized upward arrow/mountain -->
  <g transform="translate(10, 8)">
    <!-- Mountain/Arrow shape -->
    <path d="M22 42 L10 42 L22 8 L34 42 L22 42" fill="url(#ascentGradient)" />
    <path d="M22 8 L28 22 L22 18 L16 22 L22 8" fill="url(#accentGradient)" />
    <!-- Accent line -->
    <rect x="14" y="32" width="16" height="3" rx="1.5" fill="url(#accentGradient)" />
  </g>
  
  <!-- ASCENT Text -->
  <text x="52" y="38" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1e3a5f" letter-spacing="1">
    ASCENT
  </text>
  
  <!-- Tagline -->
  <text x="52" y="50" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="500" fill="#6b7280" letter-spacing="2">
    BUSINESS SOLUTIONS
  </text>
</svg>

