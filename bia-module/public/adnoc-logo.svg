  </g>
  
  <!-- ADNOC Text -->
  <text x="52" y="36" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#e31837" letter-spacing="2">
    ADNOC
  </text>
  
  <!-- Tagline -->
  <text x="52" y="50" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="500" fill="#6b7280" letter-spacing="1.5">
