<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- ADNOC Brand Colors -->
  <defs>
    <linearGradient id="adnocRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e31837;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c41230;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- ADNOC Icon - Stylized flame/droplet -->
  <g transform="translate(8, 5)">
    <!-- Main flame/droplet shape -->
    <path d="M20 48 C8 48 2 38 2 28 C2 18 10 8 20 2 C30 8 38 18 38 28 C38 38 32 48 20 48" fill="url(#adnocRed)" />
    <!-- Inner highlight -->
